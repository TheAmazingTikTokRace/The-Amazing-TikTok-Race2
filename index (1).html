<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazing Race - Tokyo Takeover</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #f5f7fb;
    }

    .card {
      width: min(90vw, 420px);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(245, 247, 251, 0.7);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    input:focus { border-color: rgba(255, 255, 255, 0.25); }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: #ffffff;
      color: #0f1115;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .message {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.95rem;
      color: #ff8f8f;
    }

    .secret {
      margin-top: 22px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: none;
      color: #ffffff;
      line-height: 1.6;
    }

    .secret.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Simple TikTok-style logo (minimal SVG) -->
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 10c5 10 15 15 25 15v15c-10 0-20-3-25-8v28a22 22 0 1 1-22-22c2 0 4 0 6 1v15a8 8 0 1 0 8 8V10z" fill="#25F4EE" opacity="0.8"/>
        <path d="M55 10c5 10 15 15 25 15v15c-10 0-20-3-25-8v28a22 22 0 1 1-22-22c2 0 4 0 6 1v15a8 8 0 1 0 8 8V10z" fill="#FE2C55" opacity="0.8"/>
        <path d="M58 10c5 10 15 15 25 15v15c-10 0-20-3-25-8v28a22 22 0 1 1-22-22c2 0 4 0 6 1v15a8 8 0 1 0 8 8V10z" fill="#ffffff"/>
      </svg>
    </div>

    <h1>Welcome to The Amazing Race - Tokyo Takeover</h1>
    <div class="subtitle">Enter the correct password to reveal your next task.</div>

    <input id="passwordInput" type="password" placeholder="Enter password" />
    <button onclick="checkPassword()">Unlock</button>

    <div id="message" class="message"></div>
    <div id="secret" class="secret">
      Let's play some games! Make your way to Taito Station Shibuya Arcade and find Jono for your next clue!
    </div>
  </div>

  <script>
    const correctPassword = "6855"; // Change this password

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const message = document.getElementById("message");
      const secret = document.getElementById("secret");

      if (input === correctPassword) {
        secret.classList.add("show");
        message.style.color = "#9bffb0";
        message.textContent = "Access granted.";
      } else {
        secret.classList.remove("show");
        message.style.color = "#ff8f8f";
        message.textContent = "Incorrect password.";
      }
    }

    document.getElementById("passwordInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
  </script>
</body>
</html>
